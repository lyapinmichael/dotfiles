general.import = [
 "./catppuccin-frappe.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 12.0

[font.bold]
family = "AtkynsonMono Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "AtkynsonMono Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "AtkynsonMono Nerd Font Mono"
style = "Italic"

[font.normal]
family = "AtkynsonMono Nerd Font Mono"
style = "Regular"
